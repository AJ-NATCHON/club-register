<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนชุมนุม | เบญจมราชาลัย</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ระบบลงทะเบียนชุมนุม</h1>
            <p>โรงเรียนเบญจมราชาลัย ในพระบรมราชูปถัมภ์</p>
        </header>

        <section id="login-section" class="card">
            <h2>เข้าสู่ระบบนักเรียน</h2>
            <div class="input-group">
                <input type="email" id="login-email" placeholder="อีเมล (@br.ac.th)" autocomplete="username" required>
                <input type="password" id="login-id" placeholder="เลขประจำตัวนักเรียน" autocomplete="current-password" required>
                <button onclick="handleLogin()" class="btn-main" id="login-btn">เข้าสู่ระบบ</button>
            </div>
            <div style="text-align:center; margin-top:15px;">
                <a href="admin.html" style="display:inline-block; padding:8px 16px; background:#6c757d; color:white; border-radius:5px; text-decoration:none; font-size:14px; margin-right:10px;">🔧 ผู้ดูแลระบบ</a>
                <a href="teacher.html" style="display:inline-block; padding:8px 16px; background:#17a2b8; color:white; border-radius:5px; text-decoration:none; font-size:14px;">👩‍🏫 ครูที่ปรึกษา</a>
            </div>
        </section>

        <section id="registration-section" class="card" style="display:none;"></section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
